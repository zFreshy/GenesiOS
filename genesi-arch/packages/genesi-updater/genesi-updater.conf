# Genesi OS Updater Configuration

# Check interval in seconds (default: 3600 = 1 hour)
check_interval=3600

# Automatically download updates (requires root)
# Default: false (only check, don't download)
auto_download=false

# Show desktop notifications when updates are available
# Default: true
notify_user=true

# Include AUR packages in update check (requires yay or paru)
# Default: false
include_aur=false

# Notification urgency: low, normal, critical
# Default: normal
notification_urgency=normal

# Auto-update Genesi packages only (safe updates)
# Default: false
auto_update_genesi=false
