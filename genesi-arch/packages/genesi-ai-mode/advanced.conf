# Genesi AI Mode — advanced, opt-in tradeoff knobs (roadmap 2.8.9)
#
# Everything here is OFF by default. These are squeeze-the-last-few-percent
# tweaks with real tradeoffs, so you turn them on deliberately. Enabled keys are
# applied ONLY when AI Mode runs aggressively (on AC power, or when you force it
# on), and every one is fully reversible — the daemon captures the original
# value on enable and restores it on disable. The file is read live; no restart
# needed. Lines starting with '#' are comments; format is `key = value`.

# --- Explicit huge pages ------------------------------------------------------
# Reserve N huge pages (2 MB each) so the model weights sit on huge pages
# (fewer TLB misses). The reservation is taken from normal memory and is NOT
# available to other apps, so it's risky on low-RAM machines — the daemon
# refuses if the request would exceed 50% of currently-free RAM. Pick N so that
# N*2MB comfortably covers your model (e.g. 4096 = 8 GB). Default: off.
hugepages = off

# --- PCIe ASPM ----------------------------------------------------------------
# Force the PCIe Active State Power Management policy to "performance" while AI
# Mode runs (no link power-saving = lower, steadier latency to the GPU).
# Restored to the previous policy on disable. Default: off.
pcie_aspm = off

# --- NOT auto-applied (here for reference) ------------------------------------
# usb_autosuspend: disabling USB autosuspend is broad (touches every USB device)
#   and barely helps inference, so the daemon does not toggle it. If you want it,
#   set it per-device via udev rules instead.
#
# mitigations=off: disabling CPU security mitigations can raise throughput a few
#   percent, but it is a BOOT-TIME kernel parameter — it cannot be toggled live
#   and it weakens security. To opt in, add `mitigations=off` to your kernel
#   cmdline (e.g. GRUB_CMDLINE_LINUX_DEFAULT) yourself and reboot. The daemon
#   will not edit your bootloader.
