# Genesi AI Mode — advanced, opt-in tradeoff knobs (roadmap 2.8.9)
#
# Everything here is OFF by default. These are squeeze-the-last-few-percent
# tweaks with real tradeoffs, so you turn them on deliberately. Enabled keys are
# applied ONLY when AI Mode runs aggressively (on AC power, or when you force it
# on), and every one is fully reversible — the daemon captures the original
# value on enable and restores it on disable. The file is read live; no restart
# needed. Lines starting with '#' are comments; format is `key = value`.

# --- Explicit huge pages ------------------------------------------------------
# Reserve N huge pages (2 MB each) so the model weights sit on huge pages
# (fewer TLB misses). The reservation is taken from normal memory and is NOT
# available to other apps, so it's risky on low-RAM machines — the daemon
# refuses if the request would exceed 50% of currently-free RAM. Pick N so that
# N*2MB comfortably covers your model (e.g. 4096 = 8 GB). Default: off.
hugepages = off

# --- Smart auto-detect idle timeout -------------------------------------------
# AI Mode now powers up on real workload (a model generating) instead of merely
# "ollama is installed", and powers back DOWN when you stop. This is the grace
# window, in seconds, that AI Mode stays engaged after the last activity before
# standing down — long enough not to drop between chat turns (you read a reply,
# then type the next prompt), short enough to release the machine when you walk
# away. While a model is still resident (ollama keep_alive) AI Mode stays in the
# lighter "balanced" tier, not full "max". Set 0 to power down as soon as the
# workload goes idle. Default: 90.
ai_idle_timeout = 90

# --- Always-warm Turbo Daemon -------------------------------------------------
# Keep the Turbo inference server (llama-server) running permanently in the
# background via the genesi-turbo.service systemd unit, on the model the advisor
# picks for THIS machine's VRAM (`genesi-ai-turbo recommend`; override with
# /etc/genesi-ai-mode/turbo.env GENESI_WARM_MODEL). This eliminates the
# "cold-start" load time (the first reply is instant) and gives every Genesi app
# one shared warm model + KV cache on :11435, but permanently reserves VRAM/RAM.
# When 'on', genesi-aid starts/stops the unit for you. You can also run it
# directly: `sudo systemctl enable --now genesi-turbo.service`. Default: off.
always_warm_turbo = off

# --- ZRAM AI swap (Tier 4 / "Ideia 3") ----------------------------------------
# Bring up a zstd-compressed RAM swap device at HIGH priority while AI Mode runs
# aggressively. When a big model + the browser exhaust RAM, cold pages compress
# in RAM instead of stalling the desktop on slow SSD swap — no more Windows-style
# "freeze" when switching between the browser and the AI. Fully removed (swapoff
# + reset) on disable. Silent no-op if the zram module / zramctl aren't present,
# so it can never hurt a machine that lacks them. Value:
#   off            (default)
#   on             create a device sized at half RAM (capped 16G)
#   8G             an explicit size
zram_ai = off

# --- PCIe ASPM ----------------------------------------------------------------
# Force the PCIe Active State Power Management policy to "performance" while AI
# Mode runs (no link power-saving = lower, steadier latency to the GPU).
# Restored to the previous policy on disable. Default: off.
pcie_aspm = off

# --- sched-ext throughput scheduler (2.8.7) -----------------------------------
# While AI Mode runs aggressively, load a BPF sched_ext scheduler in throughput-
# oriented "server" mode via scxctl, then switch back to whatever was running on
# disable. Needs a sched_ext-capable kernel (CachyOS ships one) and the scxctl
# tool from the scx-scheds package — it's a silent no-op without both, so it
# can never hurt a machine that lacks sched-ext. Value can be:
#   off            (default) leave the scheduler alone
#   on             use scx_bpfland in server mode
#   scx_lavd       a specific scheduler in server mode
#   scx_rusty:server   a specific scheduler AND mode (auto|gaming|powersave|
#                      lowlatency|server)
sched_ext = off

# --- NOT auto-applied (here for reference) ------------------------------------
# usb_autosuspend: disabling USB autosuspend is broad (touches every USB device)
#   and barely helps inference, so the daemon does not toggle it. If you want it,
#   set it per-device via udev rules instead.
#
# mitigations=off: disabling CPU security mitigations can raise throughput a few
#   percent, but it is a BOOT-TIME kernel parameter — it cannot be toggled live
#   and it weakens security. To opt in, add `mitigations=off` to your kernel
#   cmdline (e.g. GRUB_CMDLINE_LINUX_DEFAULT) yourself and reboot. The daemon
#   will not edit your bootloader.
