# Genesi OS - AI Mode static tuning
# These are safe, always-on defaults that help local AI inference without
# permanently reserving resources. The dynamic, reversible tweaks (CPU
# governor, swappiness, transparent huge pages) are applied by genesi-aid only
# while an AI workload is running.
#
# NOTE: vm.nr_hugepages is intentionally NOT set here. Pre-allocating huge
# pages reserves that RAM permanently — even with no AI running — which
# contradicts "everything returns to normal". Transparent Huge Pages (toggled
# to `madvise` by the daemon on demand) covers the same need without the waste,
# and `madvise` avoids the khugepaged/compaction stalls that `always` can cause.

# Allow large models to create enough memory mappings (llama.cpp/ggml mmap the
# weights; big models can exceed the conservative default).
vm.max_map_count = 1048576

# GGUF weights are read sequentially and cached; bias the kernel toward keeping
# that page cache over reclaiming dentries/inodes.
vm.vfs_cache_pressure = 50
