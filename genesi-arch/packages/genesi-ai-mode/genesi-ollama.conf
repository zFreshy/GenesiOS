# Genesi OS — sane Ollama defaults (drop-in).
# Lives in ollama.service.d, so it only takes effect once Ollama is installed
# (systemd ignores drop-ins for units that don't exist yet). Harmless otherwise.
#
#   Flash Attention      — faster attention, less memory bandwidth
#   KV cache q8_0        — ~half the KV-cache memory => more context / bigger
#                          models fit (requires flash attention, enabled above)
#   Keep-alive 15m       — keep the model resident between prompts (no reload)
[Service]
Environment=OLLAMA_FLASH_ATTENTION=1
Environment=OLLAMA_KV_CACHE_TYPE=q8_0
Environment=OLLAMA_KEEP_ALIVE=15m
