# Genesi OS — sane Ollama defaults (drop-in).
# Lives in ollama.service.d, so it only takes effect once Ollama is installed
# (systemd ignores drop-ins for units that don't exist yet). Harmless otherwise.
#
#   Flash Attention      — faster attention, less memory bandwidth
#   KV cache q8_0        — ~half the KV-cache memory => more context / bigger
#                          models fit (requires flash attention, enabled above)
#   Keep-alive 15m       — keep the model resident between prompts (no reload)
#
# NUM_PARALLEL / MAX_LOADED_MODELS are picked from this machine's RAM/VRAM by
# genesi-aid and written to the EnvironmentFile below. The leading '-' makes it
# optional: if the daemon hasn't written it yet, Ollama just uses its defaults
# (and picks up the tuned values on its next start).
[Service]
Environment=OLLAMA_FLASH_ATTENTION=1
Environment=OLLAMA_KV_CACHE_TYPE=q8_0
Environment=OLLAMA_KEEP_ALIVE=15m
EnvironmentFile=-/run/genesi-ai-mode/ollama.env

# Garantir que os modelos baixados pelo daemon (root/ollama) possam ser lidos
# pelo usuário comum. Necessário para que o genesi-ai-turbo consiga ler os
# arquivos .gguf direto do disco sem precisar de sudo.
UMask=0022
ExecStartPost=+/bin/sh -c 'chmod a+rx /var/lib/ollama /var/lib/ollama/models 2>/dev/null; chmod -R a+rX /var/lib/ollama/models/blobs /var/lib/ollama/models/manifests 2>/dev/null || true'
