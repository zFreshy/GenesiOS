# 2026-05-29: reverted defense cascade. See
# efiboot/loader/entries/01-archiso-linux.conf for full rationale.
# Short version: vmwgfx blacklist + nomodeset + noglx killed OpenGL
# compositing, which killed rounded corners + blur + transparency. Back
# to the 5/21 cmdline (only pcspkr blacklisted, KMS forced for Intel/AMD).
LABEL cos64
TEXT HELP
Boot the Genesi OS install medium on BIOS.
It allows you to install Genesi OS or perform system maintenance.
ENDTEXT
MENU LABEL Genesi OS default (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr i915.modeset=1 amdgpu.modeset=1 nvme_load=yes

# copytoram=y copies the squashfs into RAM once, then runs from memory.
# Off USB/Ventoy this replaces a multi-minute sluggish boot with a one-time
# ~20s-2min copy + an instant system. Needs ~8GB+ RAM; 4GB must use default.
LABEL cos64ram
TEXT HELP
Load the whole system into RAM, then run from memory (fast on USB/Ventoy).
Needs 8GB+ RAM. Use the default entry on machines with 4GB.
ENDTEXT
MENU LABEL Genesi OS (Load to RAM - fast, needs 8GB+ RAM)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=y module_blacklist=pcspkr i915.modeset=1 amdgpu.modeset=1 nvme_load=yes

# Fallback also blacklists every nvidia* module for cases where nvidia
# drivers themselves are the failure mode (broken signature, KMS hang).
LABEL cos64fb
TEXT HELP
Boot the Genesi OS install medium on Bios in fallback mode.
Use this if the default entry still misbehaves (also blacklists nvidia*).
ENDTEXT
MENU LABEL Genesi OS Fallback (no nvidia, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm,pcspkr,vmwgfx nomodeset nvme_load=yes

# ⚠ DEV / TESTE ONLY — não é pra usuário final. Boota com o nouveau BLOQUEADO
# (pro módulo NVIDIA aberto poder assumir a GPU) e overlay em RAM de 20G (cabe
# driver + CUDA + modelo). Depois rode o atalho "Genesi DEV: NVIDIA + CUDA"
# (genesi-dev-cuda-setup) que faz todo o resto. Tudo em RAM, some no reboot.
LABEL cos64devcuda
TEXT HELP
DEV/TEST ONLY: boots to a TEXT console (no desktop) with nouveau blocked + a
20G RAM overlay. A single-NVIDIA box has no display driver here, so log in as
liveuser, run genesi-dev-cuda-setup, then benchmark Genesi Turbo on CUDA from
the CLI (e.g. genesi-ai-turbo bench qwen2.5:7b). Needs 16GB+ RAM.
ENDTEXT
MENU LABEL Genesi OS [DEV/TESTE] NVIDIA + CUDA (overlay 20G, sem nouveau)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=20G copytoram=n module_blacklist=pcspkr,vmwgfx,nouveau nomodeset systemd.unit=multi-user.target nvme_load=yes
