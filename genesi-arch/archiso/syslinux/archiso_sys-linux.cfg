LABEL cos64
TEXT HELP
Boot the Genesi OS install medium on BIOS.
It allows you to install Genesi OS or perform system maintenance.
ENDTEXT
MENU LABEL Genesi OS default (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr,vmwgfx i915.modeset=1 amdgpu.modeset=1 nvme_load=yes

# Fallback (nomodeset)
LABEL cos64fb
TEXT HELP
Boot the Genesi OS install medium on Bios in fallback mode
It allows you to install Genesi OS or perform system maintenance.
ENDTEXT
MENU LABEL Genesi OS Fallback (nomodeset, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm,pcspkr,vmwgfx nomodeset nvme_load=yes

# Virtual Machine entry (VirtualBox VMSVGA, VMware) — vmwgfx blacklisted
# AND nomodeset so simpledrm picks up the framebuffer.
LABEL cos64vm
TEXT HELP
Boot the Genesi OS install medium inside a Virtual Machine (VirtualBox / VMware).
Use this if the default boot black-screens inside a VM with VMSVGA graphics.
ENDTEXT
MENU LABEL Genesi OS (Virtual Machine - VirtualBox / VMware)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr,vmwgfx nomodeset nvme_load=yes
