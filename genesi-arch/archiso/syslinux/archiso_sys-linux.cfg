# 2026-05-29: reverted defense cascade. See
# efiboot/loader/entries/01-archiso-linux.conf for full rationale.
# Short version: vmwgfx blacklist + nomodeset + noglx killed OpenGL
# compositing, which killed rounded corners + blur + transparency. Back
# to the 5/21 cmdline (only pcspkr blacklisted, KMS forced for Intel/AMD).
LABEL cos64
TEXT HELP
Boot the Genesi OS install medium on BIOS.
It allows you to install Genesi OS or perform system maintenance.
ENDTEXT
MENU LABEL Genesi OS default (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr i915.modeset=1 amdgpu.modeset=1 nvme_load=yes

# Fallback also blacklists every nvidia* module for cases where nvidia
# drivers themselves are the failure mode (broken signature, KMS hang).
LABEL cos64fb
TEXT HELP
Boot the Genesi OS install medium on Bios in fallback mode.
Use this if the default entry still misbehaves (also blacklists nvidia*).
ENDTEXT
MENU LABEL Genesi OS Fallback (no nvidia, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm,pcspkr,vmwgfx nomodeset nvme_load=yes
