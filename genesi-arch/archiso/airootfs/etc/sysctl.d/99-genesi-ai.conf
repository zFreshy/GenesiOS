# Genesi OS - AI Mode Optimizations
# These settings improve performance for local AI inference

# Transparent Huge Pages - improves memory access for large models
vm.nr_hugepages = 512

# Allow all users to use huge pages
vm.hugetlb_shm_group = 0

# Reduce swappiness when AI is running (will be set dynamically by genesi-aid)
# Default: 60, AI Mode: 10
vm.swappiness = 60

# Increase max map count for large models
vm.max_map_count = 262144

# Optimize for large file reads (GGUF models)
vm.vfs_cache_pressure = 50

# Increase readahead for sequential reads
vm.page-cluster = 3
