# Genesi OS: disable Xorg's GLX module on the live ISO.
#
# Reproduced 2026-05-27 inside VirtualBox VMSVGA: SDDM started, found the
# plasmax11 session file, spawned Xorg, and Xorg segfaulted during
# InitExtensions inside libglx.so (no GPU acceleration available, libglx
# dereferenced a NULL dispatch). SDDM retried 3x and gave up - screen
# stuck on the boot text forever.
#
# Disabling the GLX module keeps Xorg up with software rendering. Slow,
# but the installer paints and the user can finish the install. On the
# installed system, /etc/calamares/scripts/genesi-x11-detect.sh writes
# the same file ONLY when the target lacks a real KMS driver, so real
# hardware installs still get hardware-accelerated GLX.
Section "Module"
    Disable "glx"
EndSection
