title   Genesi OS %ARCH% UEFI Default
sort-key A
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
# 2026-05-29: reverted the defense-in-depth cascade (vmwgfx blacklist +
# nomodeset + noglx). On commit 2342e30 (5/21) the live ISO worked fine
# in VirtualBox WITHOUT any of these — vmwgfx loaded, logged its
# "unsupported hypervisor" warning, but still provided a usable
# framebuffer (or simpledrm picked one up). This is the same approach
# CachyOS uses. The 5/22 black-screen report that triggered the blacklist
# was a one-off; we over-corrected by adding nomodeset (after that broke
# KMS) and then noglx (after Xorg's libglx still crashed). Each "fix"
# masked another symptom while killing OpenGL compositing — which is
# exactly what Plasma 6 needs to render rounded window corners, blur,
# and transparency. Net: configs that say WindowCornerRadius=14 produce
# square windows because KWin can't compose with rounded clipping
# without OpenGL.
#
# Going back to the 5/21 cmdline (KMS forced on Intel/AMD, no defenses).
# If a specific guest VM regresses, add a tailored fix instead of
# carpet-bombing the whole graphics stack.
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr i915.modeset=1 amdgpu.modeset=1 nvme_load=yes
