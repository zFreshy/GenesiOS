title   Genesi OS %ARCH% UEFI Default
sort-key A
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
# Merged default+VM entry 2026-05-27. Previously the default boot pushed
# KMS (i915.modeset=1 amdgpu.modeset=1) which works on Intel/AMD bare metal
# but black-screened on VirtualBox VMSVGA: vmwgfx blacklisted -> no DRM
# bind -> SDDM hangs at "Logind interface found" without ever spawning
# Xorg (no /dev/dri, no /dev/fb*). Using nomodeset here makes Xorg's vesa
# driver pick up the BIOS/EFI framebuffer via VBE, which works in every
# environment (VBox, VMware, real BIOS, real UEFI). Trade-off: real-HW
# users get unaccelerated graphics during the ~15min live-ISO install;
# the installed system uses proper KMS drivers and runs full speed.
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr,vmwgfx nomodeset nvme_load=yes
