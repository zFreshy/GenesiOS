title   Genesi OS %ARCH% UEFI Default
sort-key A
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
# 2026-05-27 v3: nomodeset is genuinely required for VirtualBox VMSVGA
# (and likely other VMs). Tried removing it twice; user verified both
# times that the default entry hangs infinitely without it. The earlier
# "ja funcionou" test must have been done with VBox graphics set to
# VBoxSVGA (vboxvideo binds, KMS works). Default VMSVGA needs vmwgfx,
# which is blacklisted because it errors out on non-VMware hypervisors,
# so no DRM driver binds and SDDM has no display device.
#
# Resolution trade-off:
#   - UEFI + real HW: EFI firmware provides native-res framebuffer ->
#     simpledrm picks it up -> live ISO at monitor's native resolution.
#   - BIOS + real HW: VBE modes only (1024x768 max). Cosmetic only;
#     installer still works fine and the installed system has no
#     nomodeset, so it gets full KMS at native res after first boot.
#   - VBox / VMware: VBE modes, 1024x768 max in the live ISO.
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr,vmwgfx nomodeset nvme_load=yes
