title   Genesi OS [DEV/TESTE] NVIDIA + CUDA (overlay 20G, sem nouveau)
sort-key Z
# ⚠ DEV / TESTE ONLY — não é pra usuário final. Bloqueia o nouveau (pro módulo
# NVIDIA aberto assumir a GPU) e usa overlay em RAM de 20G (cabe driver + CUDA +
# modelo). Depois rode o atalho "Genesi DEV: NVIDIA + CUDA" (genesi-dev-cuda-setup).
# Tudo vive em RAM e some no reboot. Precisa de ~16GB+ RAM.
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=20G copytoram=n module_blacklist=pcspkr,vmwgfx,nouveau nomodeset systemd.unit=multi-user.target nvme_load=yes
