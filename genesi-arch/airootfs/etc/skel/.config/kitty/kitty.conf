# Genesi OS - Kitty Terminal Configuration

# Font
font_family      Hack
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0

# Cursor
cursor_shape block
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
url_color #667eea
url_style curly

# Window
remember_window_size  yes
initial_window_width  640
initial_window_height 400
window_padding_width 10

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# Color scheme - Genesi Purple/Blue
foreground #ffffff
background #1a1a2e

# Black
color0 #1a1a2e
color8 #6272a4

# Red
color1 #ff6b6b
color9 #ff8787

# Green
color2  #51cf66
color10 #69db7c

# Yellow
color3  #ffd93d
color11 #ffe066

# Blue
color4  #667eea
color12 #748ffc

# Magenta
color5  #764ba2
color13 #9775fa

# Cyan
color6  #22b8cf
color14 #3bc9db

# White
color7  #f8f9fa
color15 #ffffff

# Opacity
background_opacity 0.95

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes
