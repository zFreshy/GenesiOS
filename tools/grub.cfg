set timeout=1
set default=0

# Forçar resolução máxima possível ou fallback
set gfxmode=1920x1080x32,1280x720x32,1024x768x32,auto
set gfxpayload=keep
insmod all_video

menuentry "Genesi OS v0.1" {
    multiboot2 /boot/genesi.elf
    module2 /modules/test.elf "test_app"
    boot
}

menuentry "Genesi OS v0.1 (serial debug)" {
    multiboot2 /boot/genesi.elf debug
    boot
}
