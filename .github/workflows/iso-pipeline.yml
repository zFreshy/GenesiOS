name: Genesi ISO Pipeline

# Builds a validated ISO and publishes it as a GitHub Release (fast CDN
# download), separate from publish-packages.yml (the package/update feed).
#
#   Job 1 validate-install : reproduces the Calamares install (dep dry-run +
#                            real pacstrap in a throwaway root). Fails early so
#                            a broken package set never reaches a build.
#   Job 2 build-iso        : runs only if Job 1 passed; mkarchiso -> .iso ->
#                            uploaded as an artifact AND published to a Release:
#                              * tags  v* -> a versioned Release
#                              * main     -> the always-fresh "rolling" Release
#
# ── Why the triggers look the way they do (the "both pipelines race" fix) ────
# Adding a new genesi-* package means: PKGBUILD under genesi-arch/packages/**
# (built by publish-packages.yml) PLUS a reference in the Calamares
# netinstall (the genesi-calamares-config submodule). If the ISO built on the
# SAME push, validate-install would run before publish-packages had published
# the package to the [genesi] repo -> "target not found" -> false failure.
#
# So the ISO no longer builds on package/calamares pushes directly. Instead:
#   * workflow_run: build AFTER publish-packages succeeds on main, when the
#     [genesi] repo already has the new packages. No race, ever.
#   * push:         only for ISO inputs publish-packages does NOT handle
#     (archiso profile / build scripts / this workflow). packages/** and repo/**
#     are excluded so the publish bot-commit + PKGBUILD changes go through the
#     workflow_run path instead of racing here.
#   * tags v*:      cut a versioned Release.
on:
  workflow_run:
    workflows: ["Build and Publish Packages"]
    types: [completed]
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'genesi-arch/**'
      - '!genesi-arch/packages/**'
      - '!genesi-arch/repo/**'
      - '.github/workflows/iso-pipeline.yml'
      - '!**/*.md'
  workflow_dispatch:

# A newer run supersedes an in-flight one (saves Actions minutes).
concurrency:
  group: iso-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create Releases

jobs:
  # ── GATE ─────────────────────────────────────────────────────────────────
  # Avoids a redundant (and stale) push-triggered ISO when a single commit
  # changes BOTH an ISO-profile input (archiso/**) AND a package (packages/**).
  # In that case the push fires this workflow immediately (archiso matched the
  # push paths) WHILE "Build and Publish Packages" also runs — so the push-ISO
  # would build against the OLD packages. We skip it here and let the
  # workflow_run path rebuild the ISO once the fresh packages are published.
  # Non-push events (workflow_run / tag / manual) always proceed.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: 📥 Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decidir se a ISO deve rodar agora
        id: decide
        run: |
          set -e
          # Only branch pushes get the defer-to-publish treatment. Tag pushes
          # (v*) must always cut a release ISO, and non-push events too.
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo "Evento ${{ github.event_name }} (${{ github.ref }}) → roda."
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BEFORE="${{ github.event.before }}"
          RANGE="${BEFORE}..${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git rev-parse "$BEFORE" >/dev/null 2>&1; then
            RANGE="${{ github.sha }}~1..${{ github.sha }}"
          fi
          CHANGED="$(git diff --name-only "$RANGE" 2>/dev/null || git show --name-only --pretty=format: "${{ github.sha }}")"
          echo "Arquivos alterados neste push:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^genesi-arch/(packages|repo)/'; then
            echo "→ push também mexeu em packages/repo: adiando a ISO para o run pós-publish (workflow_run)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "→ só inputs de perfil da ISO mudaram: roda agora."
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  # ── JOB 1 ────────────────────────────────────────────────────────────────
  validate-install:
    needs: gate
    # When triggered by publish-packages completing, only proceed if that run
    # SUCCEEDED and was on main (a failed publish must not build an ISO from a
    # half-published repo). Other events (push to ISO inputs, tag, dispatch)
    # always run — but the gate above may defer a push that also touched
    # packages/** to the post-publish (workflow_run) ISO.
    if: >-
      needs.gate.outputs.run == 'true' &&
      (github.event_name != 'workflow_run' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    container:
      image: cachyos/cachyos-v3:latest
      options: --privileged   # Level 2 pacstrap needs full caps
    steps:
      - name: 📥 Checkout (com submódulos)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # For workflow_run, default checkout = default branch HEAD (main),
          # which already includes the publish bot-commit, so the [genesi] repo
          # served from raw.githubusercontent/main has the new packages.

      - name: 💾 Liberar espaço em disco
        run: |
          df -h / || true
          rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                 /usr/local/lib/android "${AGENT_TOOLSDIRECTORY:-}" 2>/dev/null || true
          df -h / || true

      - name: 🔑 Preparar pacman/keyring
        run: |
          # CachyOS rotates its repo signing key periodically and the cachyos-v3
          # base image's keyring lags behind, so a normal `pacman -Sy` aborts with
          #   error: cachyos-v3: signature from "CachyOS" is invalid
          # Catch-22: the sync that fetches the new keyring is the very sync that
          # fails to verify. So fetch the LATEST keyrings with signature checking
          # OFF (SigLevel=Never), then re-init/populate so every later sync
          # verifies against the fresh keys. Done UNCONDITIONALLY: the old
          # "only bootstrap if the first sync fails" guard missed the common case
          # where the first sync SUCCEEDS with the stale cached keyring and a
          # LATER verified sync is the one that fails (ISO run, 2026-06-08).
          cp /etc/pacman.conf /etc/pacman.conf.bak
          sed -i 's/^[[:space:]]*SigLevel.*/SigLevel = Never/' /etc/pacman.conf
          pacman -Sy --noconfirm --needed archlinux-keyring cachyos-keyring || true
          mv /etc/pacman.conf.bak /etc/pacman.conf
          pacman-key --init || true
          pacman-key --populate archlinux cachyos || true
          # Validation tools (now verify against the fresh keyring). If a verified
          # sync STILL trips (db caught mid-rotation), retry once with
          # SigLevel=Never — acceptable for CI build/validation tooling.
          if ! pacman -Sy --noconfirm --needed python python-yaml arch-install-scripts; then
            echo "::warning::verified sync still failing — retrying with SigLevel=Never"
            cp /etc/pacman.conf /etc/pacman.conf.bak
            sed -i 's/^[[:space:]]*SigLevel.*/SigLevel = Never/' /etc/pacman.conf
            pacman -Sy --noconfirm --needed python python-yaml arch-install-scripts
            mv /etc/pacman.conf.bak /etc/pacman.conf
          fi

      - name: 🧪 Validar instalação (Nível 1 + Nível 2)
        run: bash genesi-arch/ci/validate-install.sh

  # ── JOB 2 ────────────────────────────────────────────────────────────────
  build-iso:
    needs: validate-install            # só roda se a validação passou
    runs-on: ubuntu-latest
    # R2 creds surfaced as env so the upload step's `if:` can detect whether
    # they're configured. When the repo has no R2 secrets yet, R2_ACCESS_KEY_ID
    # is empty and the upload step is skipped — builds never break on this.
    env:
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET:            ${{ vars.R2_BUCKET }}
    container:
      image: cachyos/cachyos-v3:latest
      options: --privileged            # mkarchiso usa loop/mount/squashfs
    steps:
      - name: 📥 Checkout (com submódulos)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 💾 Liberar espaço em disco
        run: |
          df -h / || true
          rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                 /usr/local/lib/android "${AGENT_TOOLSDIRECTORY:-}" 2>/dev/null || true
          pacman -Scc --noconfirm || true
          df -h / || true

      - name: 🔧 Preparar ambiente de build
        run: |
          # CachyOS rotates its repo signing key periodically; the cachyos-v3
          # base image's keyring can lag behind, so `pacman -Sy` aborts with
          #   error: cachyos-v3: signature ... is invalid
          # Each job runs in a FRESH container, so refresh the keyrings here too
          # (Job 1's refresh doesn't carry over). Fetch the LATEST keyrings with
          # SigLevel=Never UNCONDITIONALLY (the stale cached db can "verify" with
          # old keys on the first sync yet a later verified sync fails), then
          # re-init/populate so every later sync verifies against fresh keys.
          cp /etc/pacman.conf /etc/pacman.conf.bak
          sed -i 's/^[[:space:]]*SigLevel.*/SigLevel = Never/' /etc/pacman.conf
          pacman -Sy --noconfirm --needed archlinux-keyring cachyos-keyring || true
          mv /etc/pacman.conf.bak /etc/pacman.conf
          pacman-key --init || true
          pacman-key --populate archlinux cachyos || true

          # mkarchiso roda como root; prepare-and-build.sh espera um usuário
          # NÃO-root + sudo (recusa rodar como root). Criamos esse usuário.
          # archiso + the host tools the profile's bootmodes need:
          #   uefi.grub  -> grub (grub-install)      bios.syslinux -> syslinux
          #   EFI image  -> mtools + dosfstools       ISO           -> libisoburn (xorriso)
          #   squashfs airootfs -> squashfs-tools
          if ! pacman -Sy --noconfirm --needed archiso sudo base-devel git \
               grub syslinux mtools dosfstools libisoburn squashfs-tools; then
            echo "::warning::verified sync still failing — retrying with SigLevel=Never"
            cp /etc/pacman.conf /etc/pacman.conf.bak
            sed -i 's/^[[:space:]]*SigLevel.*/SigLevel = Never/' /etc/pacman.conf
            pacman -Sy --noconfirm --needed archiso sudo base-devel git \
              grub syslinux mtools dosfstools libisoburn squashfs-tools
            mv /etc/pacman.conf.bak /etc/pacman.conf
          fi
          # The build-driver scripts are committed without the exec bit
          # (Windows checkouts), so `sudo ./buildiso.sh` -> "command not found".
          # mkarchiso handles airootfs script perms itself via profiledef.sh.
          chmod +x genesi-arch/*.sh
          useradd -m builder || true
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🏗️ Build da ISO
        run: |
          # buildiso.sh writes the ISO and only THEN runs optional post-steps
          # (sha1 checksum + GPG sign). Those post-steps fail in CI (no GPG
          # key/agent) and abort buildiso with a non-zero exit AFTER the ISO is
          # already complete. So don't let that fail the job: run it, then
          # verify the ISO exists and decide based on that.
          sudo -u builder env CI=true bash -lc '
            cd "'"$GITHUB_WORKSPACE"'/genesi-arch" && bash prepare-and-build.sh
          ' || echo "::warning::buildiso exited non-zero (post-build checksum/sign); verifying ISO exists..."
          ISO=$(find genesi-arch/out -name '*.iso' -type f | head -n1)
          if [ -z "$ISO" ]; then
            echo "::error::No ISO was produced - real build failure"
            exit 1
          fi
          echo "ISO_PATH=$ISO" >> "$GITHUB_ENV"
          echo "✅ ISO produzida: $ISO ($(du -h "$ISO" | cut -f1))"

      - name: 📊 Checksum da ISO
        run: |
          sha256sum "$ISO_PATH" | tee "$ISO_PATH.sha256"

      - name: 📤 Upload ISO (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: genesi-os-iso
          path: |
            genesi-arch/out/**/*.iso
            genesi-arch/out/**/*.iso.sha256
          retention-days: 14
          if-no-files-found: error

      # ── Single-file ISO on Cloudflare R2 (the download for the website) ────
      # R2 has no 2GB cap and ZERO egress cost. We upload the FULL ISO under ONE
      # fixed key (genesi-os-latest.iso) so every build OVERWRITES the previous
      # one — R2 storage stays at a single ~3.2GB object, permanently inside the
      # 10GB free tier => $0. (Versioned/pinned ISOs live as the free GitHub
      # Release parts instead, so nothing ever accumulates on R2 and bills you.)
      # Skipped automatically until R2 secrets are set.
      #
      # ── Why we MUST clean up orphaned multipart uploads ──────────────────────
      # rclone uploads the multi-GB ISO as a MULTIPART upload. If a run is killed
      # mid-upload (the `concurrency: cancel-in-progress` above SIGKILLs the
      # superseded run, and SIGKILL can't be trapped), the parts already sent are
      # left as an "Ongoing Multipart Upload" that STILL counts toward bucket
      # storage but never appears as a completed object. Two of those = blowing
      # past the 10GB free tier even though only one real ISO exists. So:
      #   1. `rclone cleanup` below aborts any stale incomplete uploads each run.
      #   2. (server-side, set in the R2 dashboard) an "Abort incomplete multipart
      #      uploads after 1 day" lifecycle rule on the bucket is the real
      #      backstop — it fires even when this pipeline never runs again.
      - name: ☁️ Upload single ISO to Cloudflare R2
        if: ${{ env.R2_ACCESS_KEY_ID != '' }}
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed rclone
          # Configure an rclone S3 remote for R2 entirely via env (no config file).
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export RCLONE_CONFIG_R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Abort EVERY orphaned multipart upload left by a previously-killed run
          # BEFORE uploading, so storage can never accumulate past the single real
          # ISO. `backend cleanup -o max-age=0` removes incomplete uploads of ANY
          # age (the plain `rclone cleanup` only touches ones older than 24h, which
          # would miss a fresh orphan from a build earlier the same day). Safe here:
          # the `concurrency` group guarantees no other run is uploading in
          # parallel, so there is never a legitimate in-flight upload to clobber.
          # Non-fatal — a cleanup failure must not block publishing the ISO.
          echo "🧹 Abortando uploads multipart incompletos órfãos…"
          rclone backend cleanup "R2:${R2_BUCKET}" -o max-age=0 --s3-no-check-bucket || \
            echo "::warning::rclone backend cleanup falhou (segue o upload mesmo assim)"

          echo "⬆️  $(du -h "$ISO_PATH" | cut -f1) -> r2:${R2_BUCKET}/genesi-os-latest.iso (overwrite)"
          # copyto to a fixed key overwrites the completed object in place.
          rclone copyto "$ISO_PATH" "R2:${R2_BUCKET}/genesi-os-latest.iso" \
            --s3-no-check-bucket --stats-one-line --stats 30s

          # Tiny checksum sidecar (also overwritten each build).
          sha256sum "$ISO_PATH" | awk '{print $1"  genesi-os-latest.iso"}' > latest.iso.sha256
          rclone copyto latest.iso.sha256 "R2:${R2_BUCKET}/genesi-os-latest.iso.sha256" \
            --s3-no-check-bucket

          echo "✅ Uploaded single-file ISO to R2 (one object, overwritten — \$0 storage)"

      # ── GitHub Release (tags only) ─────────────────────────────────────────
      # The full ISO lives on Cloudflare R2 as ONE file (no 2GB cap, $0 egress).
      # GitHub Release assets are capped at 2GB, so a tagged Release carries just
      # the checksum + notes and points at the R2 download.
      #
      # We deliberately do NOT split the ISO into <2GB parts anymore: splitting
      # wrote a second ~3.2GB copy next to the ISO and blew the runner's disk
      # ("No space left on device", run #15). R2 already serves the single file,
      # so the parts were redundant. Non-tag builds publish nothing to GitHub
      # Releases (R2's genesi-os-latest.iso is the rolling download); the slow
      # Actions artifact above remains as a backup.
      - name: 🧾 Preparar checksum p/ Release (tags v*)
        if: startsWith(github.ref, 'refs/tags/')
        run: sha256sum "$ISO_PATH" | awk '{print $1"  genesi-os-latest.iso"}' > genesi-os-latest.iso.sha256

      - name: 🚀 Publicar Release versionado (tags v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: genesi-os-latest.iso.sha256
          body: |
            ## Download

            The Genesi OS ISO is a single file on Cloudflare R2 (fast CDN, resumable):

            **https://pub-917a3befc9e640f0acf8eb3d52633fe2.r2.dev/genesi-os-latest.iso**

            ```bash
            aria2c -x16 -s16 https://pub-917a3befc9e640f0acf8eb3d52633fe2.r2.dev/genesi-os-latest.iso
            sha256sum -c genesi-os-latest.iso.sha256
            ```
            `genesi-os-latest.iso` always tracks the newest `main` build.

      # ── Rolling GitHub Release (main builds) ───────────────────────────────
      # The ISO lives on R2 (no 2GB cap); this Release is the always-fresh
      # "changelog page" the website mirrors. GitHub Releases are FREE, so this
      # costs nothing. We regenerate the body from git history each main build
      # (filtering the package-publish bot commits) + attach only the checksum.
      - name: 📝 Gerar changelog + checksum (rolling, main)
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          # The CI checkout is shallow; deepen it so `git log` has real history.
          git fetch --tags --prune --deepen=200 origin 2>/dev/null \
            || git fetch --tags --unshallow origin 2>/dev/null || true
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$LAST_TAG" ] && git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            RANGE="${LAST_TAG}..HEAD"
          elif git rev-parse HEAD~80 >/dev/null 2>&1; then
            RANGE="HEAD~80..HEAD"
          else
            RANGE="HEAD"
          fi

          sha256sum "$ISO_PATH" | awk '{print $1"  genesi-os-latest.iso"}' > genesi-os-latest.iso.sha256

          # Collect commits to a file first (avoids SIGPIPE/pipefail surprises),
          # drop the "ci(...): publish packages" bot commits, keep the newest 80.
          # Format: <date>\t<sha>\t<subject> so awk can group bullets by date.
          git log --no-merges --date=short \
            --pretty=format:'%ad%x09%H%x09%s' "$RANGE" > /tmp/commits.txt || true
          grep -vaE 'ci\(.+\): publish packages' /tmp/commits.txt > /tmp/commits.flt || true
          head -n 80 /tmp/commits.flt > /tmp/commits.top || true

          {
            echo "## ⬇️ Download"
            echo
            echo "The Genesi OS ISO is a single file on Cloudflare R2 (fast CDN, resumable):"
            echo
            echo "**https://pub-917a3befc9e640f0acf8eb3d52633fe2.r2.dev/genesi-os-latest.iso**"
            echo
            echo '```bash'
            echo 'aria2c -x16 -s16 https://pub-917a3befc9e640f0acf8eb3d52633fe2.r2.dev/genesi-os-latest.iso'
            echo 'sha256sum -c genesi-os-latest.iso.sha256'
            echo '```'
            echo '`genesi-os-latest.iso` always tracks the latest `main` build.'
            echo
            echo "## 📝 Changelog"
            if [ -s /tmp/commits.top ]; then
              # Group commits under a single date header (newest first) instead of
              # repeating the date on every line.
              awk -F'\t' '
                $1 != cur { cur=$1; printf("\n### %s\n\n", $1) }
                { printf("- %s (%s)\n", $3, substr($2,1,7)) }
              ' /tmp/commits.top
            else
              echo
              echo "- (no changes recorded)"
            fi
            echo
            echo "_Build ${GITHUB_SHA:0:7} · $(date -u '+%Y-%m-%d %H:%M UTC')_"
          } > CHANGELOG_ROLLING.md
          echo "----- changelog rolling -----"; cat CHANGELOG_ROLLING.md

      - name: 🧹 Clean stale assets from the rolling release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Best-effort: remove leftover assets from the old part-split scheme
          # (genesi-os.iso.part*.bin, REASSEMBLE.txt, old sha256) so the page is
          # clean. Never fails the build.
          pacman -Sy --noconfirm --needed github-cli || true
          for a in $(gh release view rolling -R "$GITHUB_REPOSITORY" \
                       --json assets --jq '.assets[].name' 2>/dev/null || true); do
            echo "removing stale asset: $a"
            gh release delete-asset rolling "$a" -R "$GITHUB_REPOSITORY" -y 2>/dev/null || true
          done

      - name: 🚀 Update rolling release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: "Genesi OS — rolling (latest main build)"
          # Mark this as the repo's "Latest" so visitors land on the actual ISO
          # build, not the infra "repo" release. prerelease=false is required for
          # GitHub to consider it Latest. Real version tags (v*) will supersede it.
          prerelease: false
          make_latest: true
          body_path: CHANGELOG_ROLLING.md
          files: genesi-os-latest.iso.sha256

      # ── Per-build archive release (main) ───────────────────────────────────
      # Every main ISO build ALSO gets its own permanent GitHub Release, so the
      # Releases page becomes a browsable build history. GitHub Release storage
      # is FREE (unlike the R2 free tier) but caps assets at 2GB/file, so we
      # split the ~3.2GB ISO into <2GB parts + a REJOIN guide. R2 is untouched
      # (still only genesi-os-latest.iso). `rolling` stays the repo's "Latest";
      # these build-<sha> releases are the archive. Disk-safe: the R2 upload and
      # the Actions artifact already ran above, so we split and then delete the
      # original ISO immediately to keep peak disk usage bounded (the old split
      # scheme blew the runner disk by keeping a second full copy around).
      - name: ✂️ Split ISO into <2GB parts (main)
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          mkdir -p parts
          # Numeric suffixes keep order: genesi-os.iso.part00, .part01, ...
          split -d -b 1900M "$ISO_PATH" parts/genesi-os.iso.part
          # Checksum of the FULL (rejoined) ISO, under the name users recreate.
          sha256sum "$ISO_PATH" | awk '{print $1"  genesi-os.iso"}' > parts/genesi-os.iso.sha256
          # Free the disk now that R2 + artifact already hold the full ISO.
          rm -f "$ISO_PATH"
          # Build the Windows concat line from the parts that actually exist
          # (handles 2 or 3 parts without hardcoding names).
          WIN_PARTS="$(ls parts/genesi-os.iso.part* | xargs -n1 basename | paste -sd'+' -)"
          {
            echo "Genesi OS ISO - split into <2GB parts (GitHub per-file limit)."
            echo
            echo "Rejoin the full genesi-os.iso, then verify the checksum:"
            echo
            echo "Linux / macOS:"
            echo "  cat genesi-os.iso.part* > genesi-os.iso"
            echo "  sha256sum -c genesi-os.iso.sha256"
            echo
            echo "Windows (cmd):"
            echo "  copy /b ${WIN_PARTS} genesi-os.iso"
            echo
            echo "Prefer one file? Grab the always-latest build from Cloudflare R2:"
            echo "  https://pub-917a3befc9e640f0acf8eb3d52633fe2.r2.dev/genesi-os-latest.iso"
          } > parts/REJOIN.txt
          echo "BUILD_TAG=build-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          echo "BUILD_NAME=Genesi OS build ${GITHUB_SHA:0:7} ($(date -u '+%Y-%m-%d'))" >> "$GITHUB_ENV"
          echo "----- parts -----"; ls -la parts

      - name: 📝 Generate per-build changelog (main)
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          # Reuse the filtered commit list built for the rolling changelog
          # (same job, same runner -> /tmp persists across steps); show the most
          # recent 20, grouped by date, newest first.
          {
            echo "## ⬇️ Download (ISO split into parts)"
            echo
            echo "The full ISO is stored as <2GB parts (GitHub's per-file cap). See **REJOIN.txt** to rebuild \`genesi-os.iso\`:"
            echo
            echo '```bash'
            echo '# Linux / macOS'
            echo 'cat genesi-os.iso.part* > genesi-os.iso'
            echo 'sha256sum -c genesi-os.iso.sha256'
            echo '```'
            echo
            echo 'Prefer one file? Grab the always-latest build from Cloudflare R2:'
            echo '**https://pub-917a3befc9e640f0acf8eb3d52633fe2.r2.dev/genesi-os-latest.iso**'
            echo
            echo "## 📝 Changelog"
            if [ -s /tmp/commits.flt ]; then
              head -n 20 /tmp/commits.flt | awk -F'\t' '
                $1 != cur { cur=$1; printf("\n### %s\n\n", $1) }
                { printf("- %s (%s)\n", $3, substr($2,1,7)) }
              '
            else
              echo
              echo "- (no changes recorded)"
            fi
            echo
            echo "_Build ${GITHUB_SHA:0:7} · $(date -u '+%Y-%m-%d %H:%M UTC')_"
          } > CHANGELOG_BUILD.md
          echo "----- changelog build -----"; cat CHANGELOG_BUILD.md

      - name: 🗃️ Create per-build archive release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_TAG }}
          name: ${{ env.BUILD_NAME }}
          # Keep `rolling` as the repo's "Latest"; these are the browsable history.
          prerelease: false
          make_latest: false
          body_path: CHANGELOG_BUILD.md
          files: |
            parts/genesi-os.iso.part*
            parts/genesi-os.iso.sha256
            parts/REJOIN.txt
