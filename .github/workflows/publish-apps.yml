name: Build and Publish Apps Repo

# Separate pacman repository for LARGE application packages (genesi-code is
# 172 MB). The main repo ([genesi]) is hosted inside the git tree
# (genesi-arch/repo/x86_64), but GitHub rejects files >100 MB in git, so big
# apps cannot live there. This workflow builds them and publishes a
# release-hosted pacman repo ([genesi-apps]) to a fixed GitHub Release.
# Package assets are immutable: every publication gets a unique pkgrel, and
# the database is switched only after the upload is verified byte-for-byte.

on:
  push:
    branches: [main]
    paths:
      - 'genesi-arch/packages/genesi-code/**'
      - '.github/workflows/publish-apps.yml'
  # PRIMARY auto-track: the genesi-code fork's release workflow pings us via
  # repository_dispatch the moment it publishes a new release, so the rebuild is
  # immediate and reliable — unlike the cron below, which GitHub silently never
  # fired (0 scheduled runs in the first 4 days), leaving [genesi-apps] stuck on
  # an old version while genesi-update/the installer correctly saw "no update".
  # Needs a PAT (secret GENESIOS_DISPATCH_TOKEN) in the fork repo. See the
  # "Notify GenesiOS" step in zFreshy/genesi-code's build workflow.
  repository_dispatch:
    types: [genesi-code-release]
  # BACKUP auto-track: every 6h pick up the latest fork release in case a
  # dispatch is ever missed. A no-op run (already published) skips the build
  # (see the "Resolve latest genesi-code release" step). Kept as a safety net;
  # the repository_dispatch above is the path that actually fires on release.
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Serialize so two runs never publish different repository snapshots at once.
concurrency:
  group: publish-apps
  cancel-in-progress: false

env:
  # Fixed release that backs the [genesi-apps] pacman repo. Only repository
  # indexes use stable names; package filenames are never overwritten.
  APPS_TAG: apps-repo
  DB_NAME: genesi-apps

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: cachyos/cachyos-v3:latest
      options: --privileged

    steps:
      - name: Install git + gh in container
        # github-cli (gh) is NOT in the cachyos-v3 image and is needed by the
        # publish step (gh release create/upload). Without it that step exits 127.
        run: pacman -Sy --needed --noconfirm git openssh github-cli

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve latest genesi-code release
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Latest release tag of the fork (e.g. v0.0.30 -> 0.0.30). GITHUB_TOKEN
          # can read another PUBLIC repo's releases; fall back to the public API.
          LATEST=$(gh release view --repo zFreshy/genesi-code --json tagName -q .tagName 2>/dev/null | sed 's/^v//') || true
          if [ -z "${LATEST:-}" ]; then
            LATEST=$(curl -fsSL https://api.github.com/repos/zFreshy/genesi-code/releases/latest \
              | grep -oP '"tag_name":\s*"v?\K[^"]+') || true
          fi
          if [ -z "${LATEST:-}" ]; then
            echo "::error::could not resolve the latest genesi-code release"; exit 1
          fi

          # What's already published in [genesi-apps]? On the cron schedule, skip a
          # no-op rebuild when it already matches (push / manual runs always build).
          PUBLISHED=$(gh release view "$APPS_TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            -q '.assets[].name' 2>/dev/null \
            | grep -oP 'genesi-code-\K[0-9][0-9.]*(?=-[0-9]+-x86_64)' \
            | sort -V | tail -1 || true)
          echo "Latest genesi-code = ${LATEST}; published in [genesi-apps] = ${PUBLISHED:-none}"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${LATEST}" = "${PUBLISHED:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date — skipping the build."
            exit 0
          fi

          # Pin the PKGBUILD to the latest release for THIS build (workspace only,
          # not committed — the committed pkgver is just a manual fallback floor).
          sed -i "s/^pkgver=.*/pkgver=${LATEST}/" \
            "$GITHUB_WORKSPACE/genesi-arch/packages/genesi-code/PKGBUILD"
          # Never rebuild different bytes under an existing package filename.
          # pacman caches the compressed size from the sync database; replacing
          # that file later causes curl's "Maximum file size exceeded".
          PUBLISH_REL="${GITHUB_RUN_ID}${GITHUB_RUN_ATTEMPT}"
          sed -i "s/^pkgrel=.*/pkgrel=${PUBLISH_REL}/" \
            "$GITHUB_WORKSPACE/genesi-arch/packages/genesi-code/PKGBUILD"
          echo "Building genesi-code ${LATEST}-${PUBLISH_REL}"

      - name: Build app packages
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # makepkg refuses to run as root, so build as an unprivileged user.
          useradd -m -G wheel builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          pacman -Sy --needed --noconfirm base-devel
          chown -R builder:builder "$GITHUB_WORKSPACE"

          mkdir -p "$GITHUB_WORKSPACE/genesi-arch/packages/apps-repo"
          chown builder:builder "$GITHUB_WORKSPACE/genesi-arch/packages/apps-repo"

          # Each app here ONLY downloads a prebuilt binary in its PKGBUILD, so
          # `makepkg -d` (skip dep checks — runtime deps are recorded in the
          # package and resolved at install time) needs nothing pre-installed.
          APPS=(
            "genesi-code"
          )
          for pkg in "${APPS[@]}"; do
            echo "::group::Building $pkg"
            cd "$GITHUB_WORKSPACE/genesi-arch/packages/$pkg"
            rm -f ./*.pkg.tar.zst
            runuser -u builder -- env \
              PKGDEST="$GITHUB_WORKSPACE/genesi-arch/packages/apps-repo" \
              makepkg -df --noconfirm --noprogressbar
            echo "::endgroup::"
          done

          # Build the pacman database for the release-hosted repo.
          cd "$GITHUB_WORKSPACE/genesi-arch/packages/apps-repo"
          rm -f "${DB_NAME}".db* "${DB_NAME}".files*
          repo-add "${DB_NAME}.db.tar.gz" ./*.pkg.tar.zst
          # pacman fetches `<repo>.db` / `<repo>.files` (not the .tar.gz). repo-add
          # already created those as SYMLINKS to the tarballs; GitHub Release assets
          # must be flat files, so replace the symlinks with real copies of the
          # tarball content. --remove-destination deletes the symlink first (a plain
          # `cp` would see "same file" since the link resolves to the source).
          cp --remove-destination "${DB_NAME}.db.tar.gz"    "${DB_NAME}.db"
          cp --remove-destination "${DB_NAME}.files.tar.gz" "${DB_NAME}.files"

          # Ensure repo-add recorded the exact immutable package filename and
          # compressed byte count before anything is uploaded.
          PACKAGE_PATH=$(find . -maxdepth 1 -type f -name 'genesi-code-*.pkg.tar.zst' -print -quit)
          test -n "$PACKAGE_PATH"
          PACKAGE_NAME=${PACKAGE_PATH#./}
          PACKAGE_SIZE=$(stat -c%s "$PACKAGE_PATH")
          DESC_ENTRY=$(bsdtar -tf "${DB_NAME}.db.tar.gz" | grep '/desc$' | head -1)
          DB_PACKAGE_NAME=$(bsdtar -xOf "${DB_NAME}.db.tar.gz" "$DESC_ENTRY" \
            | awk '/^%FILENAME%$/{getline; print; exit}')
          DB_PACKAGE_SIZE=$(bsdtar -xOf "${DB_NAME}.db.tar.gz" "$DESC_ENTRY" \
            | awk '/^%CSIZE%$/{getline; print; exit}')
          test "$DB_PACKAGE_NAME" = "$PACKAGE_NAME"
          test "$DB_PACKAGE_SIZE" = "$PACKAGE_SIZE"

          PACKAGE_SHA256=$(sha256sum "$PACKAGE_PATH" | awk '{print $1}')
          printf '%s  %s\n' "$PACKAGE_SHA256" "$PACKAGE_NAME" > "${PACKAGE_NAME}.sha256"
          printf '{\n  "source_tag": "v%s",\n  "package": "%s",\n  "size": %s,\n  "sha256": "%s",\n  "workflow_run_id": "%s",\n  "workflow_run_attempt": "%s"\n}\n' \
            "${LATEST}" "$PACKAGE_NAME" "$PACKAGE_SIZE" "$PACKAGE_SHA256" \
            "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" > "${DB_NAME}.manifest.json"
          ls -lh

      - name: Publish immutable package
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/genesi-arch/packages/apps-repo"
          # Create the backing release once; ignore if it already exists.
          gh release create "$APPS_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Genesi OS Apps Repository" \
            --notes "Release-hosted pacman repo for large Genesi apps. Package assets are immutable; stable indexes point to the current package." \
            2>/dev/null || echo "Release $APPS_TAG already exists — updating assets."
          PACKAGE_PATH=$(find . -maxdepth 1 -type f -name 'genesi-code-*.pkg.tar.zst' -print -quit)
          PACKAGE_NAME=${PACKAGE_PATH#./}
          if gh release view "$APPS_TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            -q '.assets[].name' | grep -Fxq "$PACKAGE_NAME"; then
            echo "::error::refusing to overwrite immutable package asset $PACKAGE_NAME"
            exit 1
          fi

          # Upload the unique package before changing the database. The previous
          # database continues to reference a package that still exists.
          gh release upload "$APPS_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "$PACKAGE_PATH" "${PACKAGE_NAME}.sha256"

          mkdir -p remote-package
          gh release download "$APPS_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$PACKAGE_NAME" \
            --dir remote-package
          cmp --silent "$PACKAGE_PATH" "remote-package/$PACKAGE_NAME"
          echo "$(cut -d' ' -f1 "${PACKAGE_NAME}.sha256")  remote-package/$PACKAGE_NAME" \
            | sha256sum --check -

      - name: Publish repository indexes
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/genesi-arch/packages/apps-repo"

          # Stable index names are replaced only after the immutable package was
          # downloaded from GitHub and verified byte-for-byte.
          gh release upload "$APPS_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            "${DB_NAME}.db.tar.gz" \
            "${DB_NAME}.files.tar.gz" "${DB_NAME}.files" \
            "${DB_NAME}.manifest.json" \
            "${DB_NAME}.db"

          mkdir -p remote-index
          gh release download "$APPS_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${DB_NAME}.db" \
            --pattern "${DB_NAME}.manifest.json" \
            --dir remote-index
          PACKAGE_PATH=$(find . -maxdepth 1 -type f -name 'genesi-code-*.pkg.tar.zst' -print -quit)
          PACKAGE_NAME=${PACKAGE_PATH#./}
          PACKAGE_SIZE=$(stat -c%s "$PACKAGE_PATH")
          DESC_ENTRY=$(bsdtar -tf "remote-index/${DB_NAME}.db" | grep '/desc$' | head -1)
          REMOTE_PACKAGE_NAME=$(bsdtar -xOf "remote-index/${DB_NAME}.db" "$DESC_ENTRY" \
            | awk '/^%FILENAME%$/{getline; print; exit}')
          REMOTE_PACKAGE_SIZE=$(bsdtar -xOf "remote-index/${DB_NAME}.db" "$DESC_ENTRY" \
            | awk '/^%CSIZE%$/{getline; print; exit}')
          test "$REMOTE_PACKAGE_NAME" = "$PACKAGE_NAME"
          test "$REMOTE_PACKAGE_SIZE" = "$PACKAGE_SIZE"

          # Retain recent immutable packages for clients with cached databases,
          # while preventing this fixed release from hitting its asset limit.
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${APPS_TAG}" \
            --jq '.assets
              | map(select(.name | test("^genesi-code-.*\\.pkg\\.tar\\.zst(\\.sha256)?$")))
              | sort_by(.created_at) | reverse | .[40:] | .[].id' \
            | while read -r asset_id; do
                [ -n "$asset_id" ] || continue
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
              done

          echo "Published [genesi-apps] -> https://github.com/${GITHUB_REPOSITORY}/releases/download/${APPS_TAG}/${DB_NAME}.db"
