name: Build and Publish Packages

on:
  push:
    branches: [main, develop]
    paths:
      - 'genesi-arch/packages/**'
      - '.github/workflows/publish-packages.yml'
      - '.gitmodules'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install git in container
        # archlinux:latest ships without git, which makes actions/checkout
        # fall back to the REST API — and that path does not support the
        # `submodules` input. Install git first so checkout uses native clone.
        run: pacman -Sy --noconfirm git openssh

      - name: Determine channel
        id: channel
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "name=stable"  >> "$GITHUB_OUTPUT"
            echo "branch=main"  >> "$GITHUB_OUTPUT"
          else
            echo "name=testing" >> "$GITHUB_OUTPUT"
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "Channel: $(cat "$GITHUB_OUTPUT" | grep '^name=' | cut -d= -f2)"

      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git sudo \
            python python-requests python-packaging \
            pacman-contrib libnotify plasma-workspace \
            make scdoc gettext

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          useradd -m -G wheel builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

          cd "$GITHUB_WORKSPACE/genesi-arch/packages"
          mkdir -p repo
          chown builder:builder repo

          PACKAGES=(
            "genesi-settings"
            "genesi-kde-settings"
            "genesi-ai-mode"
            "genesi-update"
            "genesi-channel"
            "genesi-calamares"
            "genesi-welcome"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "::group::Building $pkg"
            if [ ! -d "$pkg" ]; then
              echo "::warning::Package directory not found: $pkg — skipping"
              echo "::endgroup::"
              continue
            fi
            ( cd "$pkg" && rm -f *.pkg.tar.zst && \
              sudo -u builder PKGDEST="$GITHUB_WORKSPACE/genesi-arch/packages/repo" \
                makepkg -sf --noconfirm )
            echo "::endgroup::"
          done

          cd repo
          rm -f genesi.db* genesi.files*
          repo-add genesi.db.tar.gz *.pkg.tar.zst
          ls -lh

      - name: Commit packages to in-repo registry
        shell: bash
        env:
          CHANNEL: ${{ steps.channel.outputs.name }}
          BRANCH:  ${{ steps.channel.outputs.branch }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          # Place built artifacts where pacman.conf expects them.
          # Both channels publish to genesi-arch/repo/x86_64 — channel
          # separation is by branch (main = stable, develop = testing).
          mkdir -p genesi-arch/repo/x86_64
          rm -f genesi-arch/repo/x86_64/*.pkg.tar.zst genesi-arch/repo/x86_64/genesi.*
          cp genesi-arch/packages/repo/*.pkg.tar.zst genesi-arch/repo/x86_64/ || true
          cp genesi-arch/packages/repo/genesi.db.tar.gz genesi-arch/repo/x86_64/ || true
          cp genesi-arch/packages/repo/genesi.files.tar.gz genesi-arch/repo/x86_64/ || true
          # Pacman expects unsuffixed pointers as well
          ( cd genesi-arch/repo/x86_64 && \
            ln -sf genesi.db.tar.gz    genesi.db && \
            ln -sf genesi.files.tar.gz genesi.files )

          git config user.email "actions@github.com"
          git config user.name  "Genesi Bot"
          git add genesi-arch/repo
          if git diff --cached --quiet; then
            echo "No package changes to publish"
            exit 0
          fi
          git commit -m "ci(${CHANNEL}): publish packages from ${GITHUB_SHA:0:7}"
          git push origin "HEAD:${BRANCH}"

      - name: Summary
        run: |
          echo "Channel: ${{ steps.channel.outputs.name }}"
          echo "Branch:  ${{ steps.channel.outputs.branch }}"
          echo "Packages published to genesi-arch/repo/x86_64 on branch ${{ steps.channel.outputs.branch }}"
