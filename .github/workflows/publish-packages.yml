name: Build and Publish Packages

on:
  push:
    branches: [main, develop]
    paths:
      - 'genesi-arch/packages/**'
      # genesi-code is NOT built here (172 MB, release-hosted via publish-apps.yml).
      # Exclude it so bumping its PKGBUILD doesn't needlessly rebuild every package.
      - '!genesi-arch/packages/genesi-code/**'
      - '.github/workflows/publish-packages.yml'
      - '.gitmodules'
      # Submodule gitlinks. PKGBUILDs source from these via
      # `source=("git+https://github.com/zFreshy/genesi-*.git")` (cloning
      # HEAD of the submodule's upstream branch), so a bare submodule
      # pointer bump in this repo MUST rebuild the packages or `repo/x86_64`
      # ships stale content. Without these paths, every change like
      # `WindowCornerRadius=14`, `ButtonIconStyle=StyleFluent`,
      # `popupHeight=509`, Darkly 70% transparencies, etc. is committed
      # upstream and the parent pointer is bumped, but CI never fires and
      # the live ISO + installed systems keep installing the old .pkg.tar.zst
      # produced from the previous build. Reproduced 2026-05-27.
      - 'genesi-settings-full'
      - 'genesi-welcome-full'
      - 'genesi-calamares-config-full'
      - 'genesi-update-full'
      - 'genesi-packageinstaller-full'
      - 'cachyos-calamares-full'
      - 'cachyos-pkgbuilds'
  workflow_dispatch:

permissions:
  contents: write

# Serialize publish runs per branch. The packages are committed INTO the git
# tree (genesi-arch/repo/x86_64), so two concurrent runs both regenerate the
# binary genesi.db + *.pkg.tar.zst and the loser's rebase hits an unmergeable
# binary conflict ("rebase conflict while publishing packages"). Queue them so
# each run rebuilds cleanly on top of the previous one's published state.
concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # cachyos-v3 ships with CachyOS repos preconfigured + keyring trusted,
      # which is required because several Genesi packages depend on CachyOS-only
      # packages (cachyos-ananicy-rules, zram-generator, ananicy-cpp, etc.).
      image: cachyos/cachyos-v3:latest
      # --privileged so we can swapon a swapfile: genesi-llama-cpp's Vulkan
      # shader-gen forks hundreds of compilers and exhausts the runner's RAM
      # ("Cannot allocate memory / Failed to fork process"); swap raises the
      # kernel commit limit so fork() succeeds. Same pattern as iso-pipeline.
      options: --privileged

    steps:
      - name: Install git in container
        # The image may not include git in PATH; without it, actions/checkout
        # falls back to the REST API which does not support `submodules`.
        # --needed skips reinstalling when git is already present (cachyos-v3
        # ships with git, and reinstalling it on top of a running process can
        # deadlock the pacman transaction).
        run: pacman -Sy --needed --noconfirm git openssh

      - name: Determine channel
        id: channel
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "name=stable"  >> "$GITHUB_OUTPUT"
            echo "branch=main"  >> "$GITHUB_OUTPUT"
          else
            echo "name=testing" >> "$GITHUB_OUTPUT"
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "Channel: $(cat "$GITHUB_OUTPUT" | grep '^name=' | cut -d= -f2)"

      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build deps
        # Avoid `pacman -Syu`: upgrading pacman itself mid-CI can deadlock or
        # break the running container. We only need DB refresh + missing deps.
        # Pre-install ALL runtime deps used by the Genesi PKGBUILDs so makepkg -s
        # has nothing to install and cannot deadlock on a pacman prompt.
        # --overwrite='*' avoids prompts when files conflict between cachyos-v3
        # base packages and what we are layering on top.
        run: |
          set -euxo pipefail
          pacman -Sy --noconfirm

          # Collect every depends/makedepends/checkdepends declared by the
          # Genesi PKGBUILDs so makepkg never needs `-s` (which would call
          # `sudo pacman` from the unprivileged builder and is fragile).
          # Strip version constraints — pacman -S takes plain names. Also drop
          # genesi-* deps: those are built by THIS pipeline and aren't in any
          # repo yet, so `pacman -S genesi-foo` would fail. (Only the
          # genesi-desktop meta-package has genesi-* deps; it's built with
          # `makepkg -d` so its dep check is skipped at build time.)
          #
          # A handful of Genesi packages repackage AUR-only software under its
          # canonical name via provides= (genesi-app2unit -> app2unit,
          # genesi-libcava -> libcava, genesi-materialyoucolor ->
          # python-materialyoucolor, genesi-ttf-rubik-vf -> ttf-rubik-vf,
          # genesi-caelestia-{cli,shell} -> caelestia-{cli,shell}). Their bare
          # names are NOT in any pacman repo at build-deps time (only this run
          # produces them), so they must be excluded here too or `pacman -S`
          # aborts the whole pre-install. The dependent packages skip makepkg's
          # dep check (-d, see MAKEPKG_NODEPS below), and nothing actually needs
          # these at build time — only at install time, where the genesi repo
          # resolves them via provides.
          DEPS=$(
            for pkgbuild in genesi-arch/packages/*/PKGBUILD; do
              bash -c "
                set +u
                # shellcheck disable=SC1090
                source '$pkgbuild' 2>/dev/null || exit 0
                printf '%s\n' \"\${depends[@]}\" \"\${makedepends[@]}\" \"\${checkdepends[@]}\"
              "
            done \
              | sed -E 's/[<>=].*//' \
              | grep -vE '^(genesi-.*|app2unit|libcava|python-materialyoucolor|ttf-rubik-vf|caelestia-cli|caelestia-shell)$' \
              | sort -u \
              | grep -v '^$' \
              | tr '\n' ' '
          )
          echo "Collected deps: $DEPS"

          # base-devel and sudo are needed by makepkg itself; the rest comes
          # from the PKGBUILDs. python-requests/python-packaging are tooling
          # used by ISO/CI scripts outside the PKGBUILDs.
          #
          # systemd + systemd-sysvcompat MUST go together. The cachyos-v3
          # container snapshot ships these at e.g. 260.1, but `pacman -Sy`
          # above pulls fresh DBs where systemd may already be at 260.2.
          # If any transitive dep in $DEPS pulls systemd, pacman tries to
          # upgrade systemd alone -> breaks the strict
          # `systemd-sysvcompat requires systemd=260.1` dep -> transaction
          # aborts. Listing both explicitly forces pacman to resolve them
          # as a single upgrade group. Reproduced 2026-05-29 CI run on
          # commit 3c14822 (exit code 1 at this step).
          # Install with retries — the CachyOS CDN (cdn77) intermittently
          # returns HTTP 5xx (e.g. 572) and aborts the whole transaction with
          # "failed to retrieve some files". That is pure infra flake, unrelated
          # to the PKGBUILDs, so retry a few times (refreshing DBs each attempt
          # in case a mirror caught up) before giving up. Reproduced 2026-06-03.
          # -Syy (double y) FORCES a fresh DB download EVERY attempt. A plain
          # -Sy may skip the refresh when it thinks the DB is current, leaving us
          # pinned to a version a mirror already rotated away → 404. Seen
          # 2026-06-09: qt5-base-...r96 vanished from cdn77 (404) while
          # us.cachyos.org was 523 (origin down), and the single -Sy kept
          # re-requesting the gone r96. Forcing the DB re-download lets pacman
          # pick up the current version once any mirror is consistent again.
          install_deps() {
            pacman -Syy --noconfirm && \
            pacman -S --needed --noconfirm --overwrite='*' \
              base-devel git sudo \
              systemd systemd-sysvcompat \
              python-requests python-packaging \
              $DEPS
          }
          for attempt in 1 2 3 4 5 6 7; do
            if install_deps; then
              echo "build deps installed (attempt $attempt)"
              break
            fi
            if [ "$attempt" = 7 ]; then
              echo "::error::build deps failed after 7 attempts (CachyOS mirror/CDN inconsistent)"
              exit 1
            fi
            echo "::warning::build-deps attempt $attempt failed (CachyOS CDN 404/5xx); refreshing DBs, retry in 30s"
            sleep 30
          done

      - name: Normalize build flags for broad CPU compatibility
        shell: bash
        run: |
          set -euxo pipefail
          # The cachyos-v3 container compiles with -march=x86-64-v3 (AVX2/FMA/
          # BMI2), and its rust.conf uses target-cpu=native (= the GitHub
          # runner's CPU, frequently AVX-512). Both bake instructions that
          # older/consumer bare-metal CPUs may lack.
          #
          # The [genesi] repo (pacman.conf) ships a SINGLE build to EVERY
          # machine — unlike the [cachyos] repo which has per-arch v1/v3/v4
          # variants that pacman's `Architecture = auto` picks per CPU. So the
          # base system installs v1 packages on a non-v3 CPU (and boots fine),
          # but cachyos-pi & friends came only in v3 and die with
          # "Illegal instruction (core dumped)" on real hardware while running
          # fine in a v3-capable dev VM. Reproduced 2026-06-07 (cachyos-pi).
          #
          # Until the genesi repo ships per-arch variants, pin this single build
          # to the baseline x86-64 ISA so it runs on any x86-64 CPU.
          for f in /etc/makepkg.conf /etc/makepkg.conf.d/*.conf; do
            [ -f "$f" ] || continue
            sed -i -E \
              -e 's/-march=x86-64-v[0-9]+/-march=x86-64/g' \
              -e 's/-mtune=[^ "]+/-mtune=generic/g' \
              -e 's/(-C[[:space:]]*target-cpu=)[^ "]+/\1x86-64/g' \
              "$f"
          done
          echo "Effective arch flags after normalization:"
          grep -RHE 'march=|mtune=|target-cpu=' /etc/makepkg.conf /etc/makepkg.conf.d/ || true

      - name: Headroom for the heavy Vulkan build (overcommit + swap)
        shell: bash
        run: |
          # genesi-llama-cpp's Vulkan shader-gen forks hundreds of compilers, and
          # the runner refuses the fork()s with ENOMEM ("Cannot allocate memory")
          # because the kernel's commit heuristic denies the COW reservation.
          set -x
          # 1) DIRECT FIX: tell the kernel to always allow the memory reservation
          #    so fork() stops being denied (privileged container -> host /proc).
          sysctl -w vm.overcommit_memory=1 || echo "::warning::could not set overcommit"
          # 2) Real swap as a backstop so the OOM killer doesn't actually fire.
          #    Always add it — the runner already ships a tiny /swapfile, so we
          #    must NOT gate on 'swap exists' (that bug skipped it, 2026-06-09).
          if [ ! -e /ci-swapfile ]; then
            fallocate -l 16G /ci-swapfile 2>/dev/null || dd if=/dev/zero of=/ci-swapfile bs=1M count=16384
            chmod 600 /ci-swapfile
            mkswap /ci-swapfile
            swapon /ci-swapfile || echo "::warning::swapon failed — relying on overcommit"
          fi
          swapon --show || true
          free -h || true

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          useradd -m -G wheel builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

          cd "$GITHUB_WORKSPACE/genesi-arch/packages"
          mkdir -p repo
          chown builder:builder repo

          PACKAGES=(
            "genesi-settings"
            "genesi-kde-settings"
            "genesi-ai-mode"
            "genesi-mempalace"
            "genesi-update"
            "genesi-channel"
            "genesi-calamares"
            "genesi-calamares-branding"
            "genesi-welcome"
            # Window decoration + widget style + glassmorphism. Built from
            # source (paulmcauley/klassy, Bali10050/Darkly). These replace the
            # fragile customize_airootfs.sh "build on live, cp to target" hack
            # so the INSTALLED system actually has the plugins (2026-06-01:
            # reproduced installs with kwinrc->klassy but no plugin on disk).
            "genesi-klassy"
            "genesi-darkly"
            # Branded GRUB background (no more black "Arch Linux" menu).
            "genesi-grub-theme"
            # Branded fastfetch greeting (logo + system info) in the terminal.
            "genesi-fastfetch"
            # Genesi fork of the CachyOS package installer (Qt6 + Rust). Verified
            # to build in ~112s via test-packageinstaller.yml — well under the
            # 25-min per-package budget, so it won't stall the publish pipeline.
            "genesi-packageinstaller"
            # Phase 4.3-4.6 developer tools. Self-contained (scripts + QML +
            # PySide6 apps, no genesi-* build deps), so they slot in anywhere
            # before the meta-package.
            "genesi-containers"
            "genesi-sandboxes"
            "genesi-netinspect"
            "genesi-db-explorer"
            # Roadmap 5.1 — "Hyprland + caelestia-shell" desktop option. These
            # repackage AUR-only software (quickshell itself is now in Arch
            # [extra], so it is NOT rebuilt here) so the Calamares netinstall can
            # install them with pacman. Ordered leaves-first: the four small
            # AUR libs/fonts (only [extra] build-deps, normal build) before the
            # caelestia packages that depend on them. caelestia-cli/shell/settings
            # depend on the just-built (not-yet-installed) genesi provides, so
            # they build with `makepkg -d` (see MAKEPKG_NODEPS below).
            "genesi-app2unit"
            "genesi-libcava"
            "genesi-materialyoucolor"
            "genesi-ttf-rubik-vf"
            "genesi-caelestia-cli"
            "genesi-caelestia-shell"
            "genesi-caelestia-settings"
            # NOTE: genesi-code is NOT built here. Its package is 172 MB, which
            # exceeds GitHub's 100 MB git file limit, so it can't be committed to
            # the git-hosted repo. It is built and published to the separate
            # release-hosted [genesi-apps] repo by publish-apps.yml instead.
            # llama.cpp (Vulkan) — backs Genesi Turbo's `llama-server`. Verified
            # green via test-llama-cpp.yml (~10min, well under the 25-min budget).
            # Kept LAST so if its build ever flakes it can't block the others.
            "genesi-llama-cpp"
            # Meta-package (depends on all the above). Built with `makepkg -d`
            # (see MAKEPKG_NODEPS) since its genesi-* deps aren't in a repo yet.
            # Last so every component it lists has already been built this run.
            "genesi-desktop"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "::group::Building $pkg"
            if [ ! -d "$pkg" ]; then
              echo "::warning::Package directory not found: $pkg — skipping"
              echo "::endgroup::"
              continue
            fi
            # 25-min ceiling per package so a hang fails loudly instead of
            # eating the whole 6h GitHub job timeout in silence.
            # PACMAN env adds --overwrite='*' so missing-dep installs by makepkg
            # never block on file conflicts.
            # Diagnostic: prove builder can reach makepkg before invoking it.
            # `runuser` (util-linux) is used instead of `sudo` because PAM is
            # often broken in minimal Arch containers, which surfaces as the
            # builder process being killed by SIGUSR1 (exit 138).
            echo "--- diag for $pkg ---"
            id builder || true
            ls -la "$pkg" | head -10
            runuser -u builder -- bash -c "id; which makepkg; makepkg --version | head -1" || true
            # If sudo from inside builder is broken (PAM in minimal container),
            # makepkg -s will be killed by SIGUSR1 the moment it tries to call
            # `sudo pacman` for deps. Probe it explicitly.
            if runuser -u builder -- sudo -n true 2>&1; then
              echo "diag: sudo works for builder"
            else
              echo "diag: sudo BROKEN for builder (rc=$?) — relying on pre-installed deps"
            fi
            echo "--- /diag ---"

            # The genesi-desktop meta depends on other Genesi packages that
            # aren't in any repo at build time; skip makepkg's dep check for it
            # (-d). Install-time resolution from the genesi repo still applies.
            # Skip makepkg's dep check (-d) for packages whose declared deps are
            # produced by THIS run and aren't in any repo yet: the genesi-desktop
            # meta, and the caelestia packages (which depend on the genesi
            # repackages of caelestia-cli/app2unit/libcava/python-materialyoucolor
            # /ttf-rubik-vf). Nothing here is actually needed at build time;
            # install-time resolution from the genesi repo still applies.
            MAKEPKG_NODEPS=""
            case "$pkg" in
              genesi-desktop|genesi-caelestia-cli|genesi-caelestia-shell|genesi-caelestia-settings)
                MAKEPKG_NODEPS="-d" ;;
            esac

            rc=0
            for attempt in 1 2; do
              # Do NOT set PACMAN='pacman --overwrite=*'. makepkg does
              # `PACMAN_PATH=$(type -P $PACMAN)` unquoted, so a value with
              # spaces makes type -P fail (the flag isn't an executable),
              # which triggers makepkg's ERR trap → SIGUSR1 → exit 138.
              # We don't need --overwrite anyway: -s is gone and deps are
              # pre-installed in the previous step.
              if timeout 1500 bash -c "cd '$pkg' && rm -f *.pkg.tar.zst && \
                runuser -u builder -- env \
                  PKGDEST='$GITHUB_WORKSPACE/genesi-arch/packages/repo' \
                  makepkg -f $MAKEPKG_NODEPS --noconfirm --noprogressbar --log"; then
                rc=0
                break
              else
                rc=$?
              fi
              # 138 = 128+SIGUSR1, 137 = 128+SIGKILL — retry once for transient
              if [ "$rc" -eq 138 ] || [ "$rc" -eq 137 ]; then
                echo "::warning::Package $pkg killed by signal (exit $rc) on attempt $attempt — retrying"
                continue
              fi
              break
            done

            # If makepkg --log produced output, dump it so we see the real failure
            for log in "$pkg"/*.log; do
              [ -f "$log" ] || continue
              echo "::group::makepkg log: $log"
              cat "$log"
              echo "::endgroup::"
            done
            if [ "$rc" -ne 0 ]; then
              if [ "$rc" -eq 124 ]; then
                echo "::error::Package $pkg timed out after 25 minutes"
              else
                echo "::error::Package $pkg failed with exit $rc"
              fi
              # Show which declared deps pacman thinks are missing — answers
              # "is the build dying because a dep wasn't installed?".
              if [ -f "$pkg/PKGBUILD" ]; then
                echo "::group::dep status for $pkg"
                ( cd "$pkg" && \
                  ALL_DEPS=$(bash -c 'source ./PKGBUILD; printf "%s\n" "${depends[@]}" "${makedepends[@]}"' | sort -u | tr -d "'\"") && \
                  echo "declared: $ALL_DEPS" && \
                  echo "missing:" && \
                  pacman -T $ALL_DEPS || true )
                echo "::endgroup::"
              fi
              exit 1
            fi
            echo "::endgroup::"
          done

          cd repo
          rm -f genesi.db* genesi.files*
          repo-add genesi.db.tar.gz *.pkg.tar.zst
          ls -lh

      - name: Commit packages to in-repo registry
        shell: bash
        env:
          CHANNEL: ${{ steps.channel.outputs.name }}
          BRANCH:  ${{ steps.channel.outputs.branch }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          # The "Build packages" step did `chown -R builder:builder` over the
          # whole workspace, including .git. That triggers git's CVE-2022-24765
          # dubious-ownership protection and surfaces as "fatal: not in a git
          # directory" when this step (running as root) tries to use the repo.
          # Restore ownership and whitelist the path.
          chown -R "$(id -u)":"$(id -g)" "$GITHUB_WORKSPACE/.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # Place built artifacts where pacman.conf expects them.
          # Both channels publish to genesi-arch/repo/x86_64 — channel
          # separation is by branch (main = stable, develop = testing).
          mkdir -p genesi-arch/repo/x86_64
          rm -f genesi-arch/repo/x86_64/*.pkg.tar.zst genesi-arch/repo/x86_64/genesi.*
          cp genesi-arch/packages/repo/*.pkg.tar.zst genesi-arch/repo/x86_64/ || true
          cp genesi-arch/packages/repo/genesi.db.tar.gz genesi-arch/repo/x86_64/ || true
          cp genesi-arch/packages/repo/genesi.files.tar.gz genesi-arch/repo/x86_64/ || true
          # Pacman expects unsuffixed pointers as well. Use copies (not
          # symlinks) — raw.githubusercontent.com serves git symlinks as
          # plaintext (the link target path), which would break pacman when
          # a client points at the GitHub-raw URL.
          ( cd genesi-arch/repo/x86_64 && \
            cp -f genesi.db.tar.gz    genesi.db && \
            cp -f genesi.files.tar.gz genesi.files )

          git config user.email "actions@github.com"
          git config user.name  "Genesi Bot"
          # genesi-arch/repo/ is .gitignore'd so devs don't accidentally
          # commit local build outputs; only CI publishes it. -f bypasses.
          git add -f genesi-arch/repo
          if git diff --cached --quiet; then
            echo "No package changes to publish"
            exit 0
          fi
          git commit -m "ci(${CHANNEL}): publish packages from ${GITHUB_SHA:0:7}"

          # The package build takes ~25 min, during which `main` can move (a docs
          # commit, another push, the next publish run). A plain push then dies
          # with "Updates were rejected (fetch first)" and the whole publish is
          # LOST — the rebuilt .pkg.tar.zst never reaches the repo (reproduced
          # 2026-06-05). Our commit only touches genesi-arch/repo/, so it never
          # conflicts with source/doc commits: rebase onto the latest remote and
          # retry a few times so a concurrent push can't drop a publish.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${BRANCH}"; then
              echo "Published packages (push attempt ${attempt})"
              break
            fi
            if [ "${attempt}" = "5" ]; then
              echo "::error::could not push packages after 5 attempts"
              exit 1
            fi
            echo "push rejected (attempt ${attempt}/5) — re-basing publish onto origin/${BRANCH}…"
            git fetch origin "${BRANCH}"
            # Our commit ONLY (re)generates genesi-arch/repo/, and because every
            # run rebuilds the FULL package set + db, our freshly built artifacts
            # are the authoritative latest snapshot (a newer run's tree is a
            # superset of an older one's). A plain `git rebase` can't 3-way-merge
            # the BINARY repo db (genesi.db.tar.gz / *.pkg.tar.zst), so a
            # concurrent publish made it abort with a conflict and the whole
            # publish was LOST (run #158, 2026-06-16: the previous run's
            # "ci(stable): publish…" landed on main mid-build). Instead of
            # rebasing binary files, re-create our commit on top of the latest
            # remote tip: reset HEAD+index to origin (keeping our just-built
            # repo/ in the working tree), then re-stage and re-commit ONLY
            # genesi-arch/repo/. This preserves any concurrent source/doc change
            # on the branch and takes the repo artifacts from us (ours wins).
            git reset --mixed "origin/${BRANCH}"
            git add -f genesi-arch/repo
            if git diff --cached --quiet; then
              echo "No package changes to publish after sync"; exit 0
            fi
            git commit -m "ci(${CHANNEL}): publish packages from ${GITHUB_SHA:0:7}"
            sleep $(( (RANDOM % 4) + 2 ))
          done

      - name: Summary
        run: |
          echo "Channel: ${{ steps.channel.outputs.name }}"
          echo "Branch:  ${{ steps.channel.outputs.branch }}"
          echo "Packages published to genesi-arch/repo/x86_64 on branch ${{ steps.channel.outputs.branch }}"
