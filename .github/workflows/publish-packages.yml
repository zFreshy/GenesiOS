name: Build and Publish Packages

on:
  push:
    branches: [main, develop]
    paths:
      - 'genesi-arch/packages/**'
      - '.github/workflows/publish-packages.yml'
      - '.gitmodules'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # cachyos-v3 ships with CachyOS repos preconfigured + keyring trusted,
      # which is required because several Genesi packages depend on CachyOS-only
      # packages (cachyos-ananicy-rules, zram-generator, ananicy-cpp, etc.).
      image: cachyos/cachyos-v3:latest

    steps:
      - name: Install git in container
        # The image may not include git in PATH; without it, actions/checkout
        # falls back to the REST API which does not support `submodules`.
        # --needed skips reinstalling when git is already present (cachyos-v3
        # ships with git, and reinstalling it on top of a running process can
        # deadlock the pacman transaction).
        run: pacman -Sy --needed --noconfirm git openssh

      - name: Determine channel
        id: channel
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "name=stable"  >> "$GITHUB_OUTPUT"
            echo "branch=main"  >> "$GITHUB_OUTPUT"
          else
            echo "name=testing" >> "$GITHUB_OUTPUT"
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "Channel: $(cat "$GITHUB_OUTPUT" | grep '^name=' | cut -d= -f2)"

      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build deps
        # Avoid `pacman -Syu`: upgrading pacman itself mid-CI can deadlock or
        # break the running container. We only need DB refresh + missing deps.
        # Pre-install ALL runtime deps used by the Genesi PKGBUILDs so makepkg -s
        # has nothing to install and cannot deadlock on a pacman prompt.
        # --overwrite='*' avoids prompts when files conflict between cachyos-v3
        # base packages and what we are layering on top.
        run: |
          set -euxo pipefail
          pacman -Sy --noconfirm
          pacman -S --needed --noconfirm --overwrite='*' \
            base-devel git sudo \
            python python-requests python-packaging python-psutil \
            pacman-contrib libnotify \
            make scdoc gettext \
            zram-generator ananicy-cpp cachyos-ananicy-rules \
            inxi iw wireless-regdb \
            archlinux-contrib curl fakeroot htmlq diffutils \
            hicolor-icon-theme python-pyqt6 qt6-svg glib2 xdg-utils \
            polkit \
            plasma-workspace ttf-fantasque-nerd

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          useradd -m -G wheel builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

          cd "$GITHUB_WORKSPACE/genesi-arch/packages"
          mkdir -p repo
          chown builder:builder repo

          PACKAGES=(
            "genesi-settings"
            "genesi-kde-settings"
            "genesi-ai-mode"
            "genesi-update"
            "genesi-channel"
            "genesi-calamares"
            "genesi-welcome"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "::group::Building $pkg"
            if [ ! -d "$pkg" ]; then
              echo "::warning::Package directory not found: $pkg — skipping"
              echo "::endgroup::"
              continue
            fi
            # 25-min ceiling per package so a hang fails loudly instead of
            # eating the whole 6h GitHub job timeout in silence.
            # PACMAN env adds --overwrite='*' so missing-dep installs by makepkg
            # never block on file conflicts.
            # Diagnostic: prove builder can reach makepkg before invoking it.
            # `runuser` (util-linux) is used instead of `sudo` because PAM is
            # often broken in minimal Arch containers, which surfaces as the
            # builder process being killed by SIGUSR1 (exit 138).
            echo "--- diag for $pkg ---"
            id builder || true
            ls -la "$pkg" | head -10
            runuser -u builder -- bash -c "id; which makepkg; makepkg --version | head -1" || true
            # If sudo from inside builder is broken (PAM in minimal container),
            # makepkg -s will be killed by SIGUSR1 the moment it tries to call
            # `sudo pacman` for deps. Probe it explicitly.
            if runuser -u builder -- sudo -n true 2>&1; then
              echo "diag: sudo works for builder"
            else
              echo "diag: sudo BROKEN for builder (rc=$?) — relying on pre-installed deps"
            fi
            echo "--- /diag ---"

            rc=0
            for attempt in 1 2; do
              # NOTE: dropped -s. All runtime/make deps are pre-installed by
              # the "Install build deps" step. The -s flag makes makepkg call
              # `sudo pacman` from the builder user; in a minimal container
              # with broken PAM that gets killed by SIGUSR1 (exit 138).
              if timeout 1500 bash -xc "cd '$pkg' && rm -f *.pkg.tar.zst && \
                runuser -u builder -- env \
                  PKGDEST='$GITHUB_WORKSPACE/genesi-arch/packages/repo' \
                  PACMAN='pacman --overwrite=*' \
                  makepkg -f --noconfirm --noprogressbar --log"; then
                rc=0
                break
              else
                rc=$?
              fi
              # 138 = 128+SIGUSR1, 137 = 128+SIGKILL — retry once for transient
              if [ "$rc" -eq 138 ] || [ "$rc" -eq 137 ]; then
                echo "::warning::Package $pkg killed by signal (exit $rc) on attempt $attempt — retrying"
                continue
              fi
              break
            done

            # If makepkg --log produced output, dump it so we see the real failure
            for log in "$pkg"/*.log; do
              [ -f "$log" ] || continue
              echo "::group::makepkg log: $log"
              cat "$log"
              echo "::endgroup::"
            done
            if [ "$rc" -ne 0 ]; then
              if [ "$rc" -eq 124 ]; then
                echo "::error::Package $pkg timed out after 25 minutes"
              else
                echo "::error::Package $pkg failed with exit $rc"
              fi
              exit 1
            fi
            echo "::endgroup::"
          done

          cd repo
          rm -f genesi.db* genesi.files*
          repo-add genesi.db.tar.gz *.pkg.tar.zst
          ls -lh

      - name: Commit packages to in-repo registry
        shell: bash
        env:
          CHANNEL: ${{ steps.channel.outputs.name }}
          BRANCH:  ${{ steps.channel.outputs.branch }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          # Place built artifacts where pacman.conf expects them.
          # Both channels publish to genesi-arch/repo/x86_64 — channel
          # separation is by branch (main = stable, develop = testing).
          mkdir -p genesi-arch/repo/x86_64
          rm -f genesi-arch/repo/x86_64/*.pkg.tar.zst genesi-arch/repo/x86_64/genesi.*
          cp genesi-arch/packages/repo/*.pkg.tar.zst genesi-arch/repo/x86_64/ || true
          cp genesi-arch/packages/repo/genesi.db.tar.gz genesi-arch/repo/x86_64/ || true
          cp genesi-arch/packages/repo/genesi.files.tar.gz genesi-arch/repo/x86_64/ || true
          # Pacman expects unsuffixed pointers as well
          ( cd genesi-arch/repo/x86_64 && \
            ln -sf genesi.db.tar.gz    genesi.db && \
            ln -sf genesi.files.tar.gz genesi.files )

          git config user.email "actions@github.com"
          git config user.name  "Genesi Bot"
          git add genesi-arch/repo
          if git diff --cached --quiet; then
            echo "No package changes to publish"
            exit 0
          fi
          git commit -m "ci(${CHANNEL}): publish packages from ${GITHUB_SHA:0:7}"
          git push origin "HEAD:${BRANCH}"

      - name: Summary
        run: |
          echo "Channel: ${{ steps.channel.outputs.name }}"
          echo "Branch:  ${{ steps.channel.outputs.branch }}"
          echo "Packages published to genesi-arch/repo/x86_64 on branch ${{ steps.channel.outputs.branch }}"
