name: Build and Publish Packages

on:
  push:
    branches:
      - main
      - arch-base
    paths:
      - 'genesi-arch/packages/**'
      - 'genesi-arch/archiso/airootfs/**'
  workflow_dispatch:

jobs:
  build-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: cachyos/cachyos-v3:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies and setup builder
        run: |
          pacman -Syu --noconfirm base-devel git sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
      
      - name: Build packages
        run: |
          sudo -u builder bash -c "
            cd genesi-arch/packages
            bash build-packages.sh
          "
      
      - name: List built packages
        run: |
          ls -lh genesi-arch/packages/repo/
      
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "repo"
          name: "Genesi OS Rolling Repository"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          body: |
            ## Genesi OS Package Repository
            
            Automatically built packages from commit ${{ github.sha }}
            
            ### Installation:
            Add to `/etc/pacman.conf`:
            ```ini
            [genesi]
            SigLevel = Optional TrustAll
            Server = https://github.com/zFreshy/GenesiOS/releases/download/repo
            ```
            
            Then run:
            ```bash
            sudo pacman -Sy
            sudo pacman -S genesi-settings genesi-kde-settings genesi-ai-mode
            ```
          artifacts: "genesi-arch/packages/repo/*.pkg.tar.zst,genesi-arch/packages/repo/genesi.db.tar.gz,genesi-arch/packages/repo/genesi.files.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
